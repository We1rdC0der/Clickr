<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Disconnected</title>
        <link rel="stylesheet" href="assets/styles.css">
        <style>
            .disconnected-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background-color: #f8d7da;
                color: #721c24;
                font-family: Arial, sans-serif;
            }
            .disconnected-container h1 {
                font-size: 48px;
                margin-bottom: 20px;
            }
            .disconnected-container p {
                font-size: 18px;
            }
            </style>
    </head>
<body>
    <div class="disconnected-container">
        <h1>Disconnected</h1>
        <p>Your connection to the server has been lost. Please check your network and try again.</p>
    </div>  
</html>
