  <!--SERVER SCRIPTING-->
<script>
  if (!crypto.randomUUID) {
    crypto.randomUUID = function() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };
  }
</script>
<!--OTHER STUFFS-->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">

<body>

  <script>         
   function startsettings() {
    window.location.href = "settings/index.html";
}
  </script>
  <script src="applySettings.js"></script>
  <script>
    const icon = document.getElementById('fullscreen-img');
    let on = false;
    icon.src = "assets/fullscreen.png";

    function loadfullscreenSetting() {
            if(on === true)
            {
                icon.src = "assets/exit-fullscreen.png";
                on = false;

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) { /* IE11 */
                    document.documentElement.msRequestFullscreen();
                }
            }
            else
            {
                icon.src = "assets/fullscreen.png";
                on = true;

                if (document.exitFullscreen) {
                  document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                  document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                document.msExitFullscreen();
                }
            }
            
    }
</script>
  


<!--SERVER CODE DO NOT TOUCH-->
<script>
  const host = window.location.hostname;
const ws = new WebSocket(`ws://${host}:3210`);
ws.onopen = () => console.log("Connected to Clickr server");
ws.onerror = (err) => console.error("WebSocket error:", err);
ws.onmessage = (event) => {
    console.log("Raw message received:", event.data); // add this
    const msg = JSON.parse(event.data);
    console.log("Parsed message:", msg); // and this
    if (msg.type === "disconnected") {
        ws.close();
        window.location.href = "disconect.html";
    }
};
</script>
